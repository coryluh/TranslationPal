<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Translation Practice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 {
            color: #2c3e50;
        }
        #container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #sentence {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        select, input[type="text"], button {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        select {
            margin-bottom: 20px;
        }
        button {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            margin-right: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Chinese Translation GPT Assistant</h1>
        <label for="difficulty">Select ILR Difficulty Level:</label>
        <select id="difficulty">
            <option value="1+">ILR Level 1+</option>
            <option value="2">ILR Level 2</option>
            <option value="2+">ILR Level 2+</option>
            <option value="3">ILR Level 3</option>
        </select>
        <div id="sentence">Loading...</div>
        <input type="text" id="translation" placeholder="Enter your translation">
        <button onclick="submitTranslation()">Submit</button>
        <button onclick="getSentence()">New Sentence</button>
        <div id="result"></div>
    </div>

    <script>
        //DO NOT COMMIT
        //DO NOT COMMIT
        const apiKey = ''; // Replace with your OpenAI API key
        //DO NOT COMMIT
        //DO NOT COMMIT
        //FOR THE LOVE OF GOD

        let currentSentence = '';

        async function getSentence() {
            const difficulty = document.getElementById('difficulty').value;
            const prompt = `Provide a sentence in Chinese from a real source (REQUIRED, do not fabricate), provide source link in paranthesis, DLPT ILR Level ${difficulty}. Only reply with the passage, this is for translation practice.`;
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [{ role: 'system', content: prompt }],
                        max_tokens: 100,
                        temperature: 0.5
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.text();
                    console.error('Error response:', response.status, errorDetails);
                    return;
                }

                const data = await response.json();
                currentSentence = data.choices[0].message.content.trim();
                document.getElementById('sentence').textContent = currentSentence;
                document.getElementById('result').innerHTML = ''; // Clear previous result
                document.getElementById('translation').value = ''; // Clear input field
            } catch (error) {
                console.error('Error fetching sentence:', error);
            }
        }

        async function submitTranslation() {
            const userTranslation = document.getElementById('translation').value.trim();
            const difficulty = document.getElementById('difficulty').value;
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            { role: 'system', content: 'You are a translation expert.' },
                            { role: 'user', content: `Rate the following translation from 1 to 10. Provide feedback if possible, breaking the sentence down and explaining the structure.\n\nOriginal sentence: "${currentSentence}"\nUser translation: "${userTranslation}"\nDifficulty level: DLPT ILR Level ${difficulty}. ` }
                        ],
                        max_tokens: 300,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.text();
                    console.error('Error response:', response.status, errorDetails);
                    return;
                }

                const data = await response.json();
                const feedback = data.choices[0].message.content.trim();
                document.getElementById('result').innerHTML = `
                    <strong>Original Sentence:</strong> ${currentSentence}<br>
                    <strong>Your Translation:</strong> ${userTranslation}<br>
                    <strong>Feedback:</strong> ${feedback}
                `;
            } catch (error) {
                console.error('Error submitting translation:', error);
            }
        }

        // Load the first sentence when the page loads
        window.onload = getSentence;
    </script>
</body>
</html>
